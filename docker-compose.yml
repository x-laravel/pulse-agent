services:
  pulse-agent:
    build:
      context: .
      dockerfile: Dockerfile
    image: pulse-agent:latest
    container_name: pulse-agent
    restart: unless-stopped
    env_file: .env
    volumes:
      # Remote server list — edit .docker/servers.php to add servers
      - ./.docker/servers.php:/app/.docker/servers.php:ro
      # SSH private key for remote server access
      - ./.docker/ssh:/root/.ssh:ro
